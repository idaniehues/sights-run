<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sights Run Lisboa</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --pink: #E8106A;
            --dark: #0f0f0f;
            --light: #f5f2ee;
            --grey: #2a2a2a;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--dark);
            color: var(--light);
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 1.5rem;
            padding: 2rem;
        }
        .icon { font-size: 3rem; }
        h1 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 2.5rem;
            letter-spacing: 3px;
            color: var(--pink);
        }
        p {
            font-size: 1.1rem;
            color: #aaa;
            max-width: 500px;
            text-align: center;
            line-height: 1.6;
        }
        a {
            background: var(--pink);
            color: white;
            text-decoration: none;
            padding: 1rem 2.5rem;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.3rem;
            letter-spacing: 3px;
            border-radius: 8px;
            margin-top: 1rem;
            transition: background 0.2s;
        }
        a:hover { background: #c40d5e; }
    </style>
</head>
<body>
    <div class="icon">📍</div>
    <h1>Out of Range</h1>
    <p>{{ message }}</p>
    <a href="/">Try Again</a>
</body>
</html>
